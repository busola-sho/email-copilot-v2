<!DOCTYPE html>
<html>
  <head>
    <title>EmailCopilot</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1>EmailCopilot</h1>

    <label for="emailBody">Email text</label>
    <textarea
      id="emailBody"
      placeholder="Select text on the page, then open this extension. Or paste email text here..."
    ></textarea>

    <button id="generateButton">Generate reply</button>

    <p id="status"></p>

    <label for="draftReply">Draft reply</label>
    <textarea id="draftReply" readonly></textarea>

    <button id="copyButton">Copy draft</button>

    <div id="metadata"></div>

    <script src="popup.js"></script>
  </body>
</html>
